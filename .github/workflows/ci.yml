name: CI with Cache Demo

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: prime-cache-333a40b
      uses: actions/cache@v4
      with:
        key: cache-333a40b
        path: ~/.cache  # Caches a dummy directory (GitHub's temp cache dir)
        
    - name: Simulate work
      run: |
        echo "Workflow ran! Cache step above showed hit/miss."
        sleep 5  # Fake "work" to see timing
